# 실험 설정
# 미확정 항목은 placeholder로 남겨둠 (CLAUDE.md 참고) — 코드에서 하드코딩 금지

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  qa_dir: data/qa
  output_dir: outputs

documents:
  - doc_id: nureg-1431-vol1
    path: data/raw/vol1
  - doc_id: nureg-1431-vol2
    path: data/raw/vol2

qa_sections:
  # QA 추출은 이 섹션으로만 한정 (인덱싱은 전체 문서)
  - "3.4.1"
  - "3.4.10"
  - "3.4.13"
  - "3.4.16"

qa_dataset:
  total: 60  # 60~62
  types:
    extractive: 22
    condition_action_mapping: 22
    definition: 6
    rationale_vol2: 6
    unanswerable: 6

chunking:
  strategies:
    - naive_fixed_length
    - sliding_window
    - semantic
    - hierarchical
  # 전략별 파라미터는 각 전략 스켈레톤에서 정의

embedding_model:
  provider: null  # TODO: 미확정
  name: null      # TODO: 미확정

llm:
  generator:
    mode: null  # TODO: "local" | "api" 중 미확정
    name: null
  judge:
    mode: null  # TODO: "local" | "api" 중 미확정
    name: null

retrieval:
  method: dense  # 고정 — lexical/hybrid 비교는 범위 밖

evaluation:
  retrieval_metrics: [hit_at_k, mrr]
  span_match: containment  # 기본: containment, 보조: iou
  k_values: [1, 3, 5]
