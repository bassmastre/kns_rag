# 실험 설정
# 미확정 항목은 placeholder로 남겨둠 (CLAUDE.md 참고) — 코드에서 하드코딩 금지

pdf_path: data/raw/vol1/NUREG-1431-Vol.1-Rev.5-LCO.pdf
source_doc: "NUREG-1431 Vol.1"

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  chunks_dir: data/chunks
  qa_dir: data/qa
  output_dir: outputs

documents:
  - doc_id: nureg-1431-vol1
    path: data/raw/vol1
  - doc_id: nureg-1431-vol2
    path: data/raw/vol2

layout:
  defaults:
    col1_max: 220
    col2_max: 410
    header_margin: 95
  overrides: {}

sections:
  - {start: 190, end: 260}

qa_sections:
  # QA 추출은 이 섹션으로만 한정 (인덱싱은 전체 문서)
  - "3.4.1"
  - "3.4.2"
  - "3.4.3"
  - "3.4.4"
  - "3.4.5"
  - "3.4.6"
  - "3.4.7"
  - "3.4.8"
  - "3.4.9"
  - "3.4.10"
  - "3.4.11"
  - "3.4.12"
  - "3.4.13"
  - "3.4.14"
  - "3.4.15"
  - "3.4.16"
  - "3.4.17"
  - "3.4.18"
  - "3.4.19"
  - "3.4.20"

qa_dataset:
  total: 60  # 60~62
  types:
    extractive: 22
    condition_action_mapping: 22
    definition: 6
    rationale_vol2: 6
    unanswerable: 6

chunking:
  strategies:
    - naive_fixed_length
    - sliding_window
    - semantic
    - action_logic
    - condition_aware
  params:
    naive_fixed_length:
      chunk_size: 900
    sliding_window:
      chunk_size: 900
      overlap: 200
    semantic:
      # null이면 embedding_model.name을 사용한다.
      # 오프라인 환경에서는 로컬 SentenceTransformer 모델 경로로 지정.
      model_name: null
      min_chars: 450
      target_chars: 900
      max_chars: 1200
      context_window_words: 45
      boundary_step_words: 3
      batch_size: 32

embedding_model:
  provider: sentence_transformers
  name: BAAI/bge-small-en-v1.5

llm:
  generator:
    mode: null  # TODO: "local" | "api" 중 미확정
    name: null
  judge:
    mode: null  # TODO: "local" | "api" 중 미확정
    name: null

retrieval:
  method: dense  # 고정 — lexical/hybrid 비교는 범위 밖

evaluation:
  retrieval_metrics: [hit_at_k, mrr]
  span_match: containment  # 기본: containment, 보조: iou
  k_values: [1, 3, 5]
