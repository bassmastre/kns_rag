# 실험 설정
# 미확정 항목은 placeholder로 남겨둠 (CLAUDE.md 참고) — 코드에서 하드코딩 금지

pdf_path: data/raw/vol1/NUREG-1431-Vol.1-Rev.5-LCO.pdf
source_doc: "NUREG-1431 Vol.1"

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  chunks_dir: data/chunks
  qa_dir: data/qa
  output_dir: outputs

documents:
  - doc_id: nureg-1431-vol1
    path: data/raw/vol1
  - doc_id: nureg-1431-vol2
    path: data/raw/vol2

layout:
  defaults:
    col1_max: 220
    col2_max: 410
    header_margin: 95
  overrides: {}

sections:
  - {start: 190, end: 260}

qa_sections:
  # QA 추출은 이 섹션으로만 한정 (인덱싱은 전체 문서)
  - "3.4.1"
  - "3.4.2"
  - "3.4.3"
  - "3.4.4"
  - "3.4.5"
  - "3.4.6"
  - "3.4.7"
  - "3.4.8"
  - "3.4.9"
  - "3.4.10"
  - "3.4.11"
  - "3.4.12"
  - "3.4.13"
  - "3.4.14"
  - "3.4.15"
  - "3.4.16"
  - "3.4.17"
  - "3.4.18"
  - "3.4.19"
  - "3.4.20"

qa_dataset:
  total: 60  # 목표 ~60. 통계 검정은 aggregate ~44 기준.
  # 확정된 5유형. unanswerable은 제외 확정(gold 공집합 → retrieval 지표에서
  # 구조적으로 빠지고 chunking-invariant). Vol.2 rationale은 코퍼스 보류로 없음.
  # 유형별 배분은 미확정 — multi_condition 우선이라는 것만 확정.
  types:
    - extractive
    - condition_action_mapping   # 정방향·역방향 혼합
    - multi_condition            # AND/OR — thesis 핵심
    - completion_time
    - definition
  # 어떤 코드도 이 블록을 읽지 않는다. 설계 기록용.

evaluation:
  k_values: [1, 3, 5]
  # 채점 기준: evidence_keywords containment (retrieval) + strict LLM judge (generation).
  # evidence_ids는 전략별 부여 방식이 다르므로 retrieval main metric이 아니다.

chunking:
  strategies:
    - naive_fixed_length
    - sliding_window
    - semantic
    - action_logic
    - condition_aware
  params:
    naive_fixed_length:
      chunk_size: 900
    sliding_window:
      chunk_size: 900
      overlap: 200
    semantic:
      # null이면 embedding_model.name을 사용한다.
      # 오프라인 환경에서는 로컬 SentenceTransformer 모델 경로로 지정.
      model_name: null
      min_chars: 450
      target_chars: 900
      max_chars: 1200
      context_window_words: 45
      boundary_step_words: 3
      batch_size: 32

embedding_model:
  provider: sentence_transformers
  name: BAAI/bge-small-en-v1.5

llm:
  # Local Ollama exposes an OpenAI-compatible endpoint at http://localhost:11434/v1.
  # The placeholder API key is supplied automatically for localhost when OLLAMA_API_KEY is unset.
  generator:
    provider: openai_compatible
    base_url: http://localhost:11434/v1
    api_key_env: OLLAMA_API_KEY
    name: gemma4:12b
    temperature: 0.0
    max_tokens: 512
    timeout_seconds: 900
    seed: 42
    max_retries: 3

  # Set name before the final run. API keys must stay in environment variables.
  # provider supports openai_compatible and anthropic.
  judge:
    provider: openai_compatible
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    name: null
    temperature: 0.0
    max_tokens: 192
    timeout_seconds: 180
    max_retries: 5

retrieval:
  method: dense  # 고정 — lexical/hybrid 비교는 범위 밖
